        <div class="logo">
            <img src="https://img.icons8.com/ios-filled/100/fa709a/butterfly.png" alt="Logo">

<div class="container">

    <h1>Period Tracker</h1>
    <p class="subtitle">Log and track your menstrual cycles</p>

    <button class="btn-add" onclick="openForm()">+ Add Cycle</button>

    <!-- NEXT PERIOD -->
    <div class="card" id="nextPredictionCard">
        <h3>Next Period Prediction</h3>
        <p id="predictionDate">–</p>
    </div>

    <!-- FORM -->
    <form id="cycleForm">
        <input type="hidden" id="editIndex">

        <label>Start Date</label>
        <input type="date" id="startDate" required>

        <label>End Date</label>
        <input type="date" id="endDate" required>

        <label>Flow</label>
        <select id="flow">
            <option>Light Flow</option>
            <option selected>Moderate Flow</option>
            <option>Heavy Flow</option>
        </select>

        <button type="submit" class="submit-btn">Save Cycle</button>
    </form>

    <!-- LIST -->
    <div id="cycleList"></div>

</div>



    <!-- Footer -->
    <footer>
